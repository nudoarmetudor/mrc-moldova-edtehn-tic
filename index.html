<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vizualizator Curriculum — Educație tehnologică și TIC</title>
<style>
:root{
  --bg:#f1f5f9; --panel:#ffffff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b;
  --t:#b45309; --t-bg:#fef3c7; --t-bd:#f59e0b;
  --d:#1d4ed8; --d-bg:#dbeafe; --d-bd:#3b82f6;
  --c-valori:#e11d48; --c-valori-bg:#ffe4e6;
  --c-domenii:#7c3aed; --c-domenii-bg:#ede9fe;
  --c-concepte:#059669; --c-concepte-bg:#d1fae5;
  --c-procese:#0284c7; --c-procese-bg:#e0f2fe;
  --c-aplicative:#d97706; --c-aplicative-bg:#fef3c7;
  --ucomp:#475569; --ucomp-bg:#e2e8f0;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
header{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.htop{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
h1{font-size:16px;margin:0;font-weight:700}
.meta{color:var(--muted);font-size:12px}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:6px 14px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.controls{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
.controls input[type=search]{padding:7px 10px;border:1px solid var(--border);border-radius:8px;width:280px;font-size:13px}
.toggle{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
.chk{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid var(--border);border-radius:20px;cursor:pointer;user-select:none}
.chk.t{background:var(--t-bg);color:var(--t);border-color:var(--t-bd)}
.chk.d{background:var(--d-bg);color:var(--d);border-color:var(--d-bd)}
.chk.off{opacity:.35;filter:grayscale(.6)}
main{padding:16px}
.view{display:none}
.view.active{display:block}

/* TIMELINE */
.lane-label{font-weight:700;margin:6px 0 8px;display:flex;align-items:center;gap:8px}
.dot{width:12px;height:12px;border-radius:3px}
.dot.t{background:var(--t-bd)} .dot.d{background:var(--d-bd)}
.timeline{display:grid;grid-template-columns:repeat(9,minmax(150px,1fr));gap:10px;overflow-x:auto;padding-bottom:8px}
.col-head{position:sticky;top:0;text-align:center;font-weight:700;color:var(--muted);padding:4px;background:var(--bg);border-bottom:2px solid var(--border)}
.cell{display:flex;flex-direction:column;gap:8px;min-height:30px}
.lu-card{border:1px solid var(--border);border-left-width:5px;border-radius:8px;background:#fff;padding:8px 10px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.lu-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.10);transform:translateY(-1px)}
.lu-card.t{border-left-color:var(--t-bd)} .lu-card.d{border-left-color:var(--d-bd)}
.lu-code{font-family:ui-monospace,Consolas,monospace;font-size:11px;color:var(--muted)}
.lu-title{font-weight:600;font-size:12.5px;margin:2px 0 4px;line-height:1.25}
.lu-foot{display:flex;gap:6px;font-size:10.5px;color:var(--muted)}
.pill{background:var(--ucomp-bg);border-radius:10px;padding:1px 7px}

.badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px}
.badge.t{background:var(--t-bg);color:var(--t)} .badge.d{background:var(--d-bg);color:var(--d)}
.badge.cls{background:#e2e8f0;color:#334155}

/* GRAPH (Arbore) */
.graph-tools{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.graph-tools button{border:1px solid var(--border);background:#fff;border-radius:6px;min-width:30px;height:28px;cursor:pointer;font-size:14px;padding:0 8px}
.glegend{display:flex;gap:10px;align-items:center;font-size:11px;color:var(--muted);margin-left:6px;flex-wrap:wrap}
.glegend span{display:inline-flex;align-items:center;gap:4px}
.sq{width:11px;height:11px;border-radius:3px;display:inline-block}
.graph-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px;background:#fff;max-height:80vh}
#gsvg{display:block}
.band-lbl{font-size:11px;fill:#94a3b8;font-weight:700}
.gnode{cursor:pointer}
.gnode text{font-family:ui-monospace,Consolas,monospace;pointer-events:none;user-select:none}
.gnode.dim{opacity:.15}
.edge.hl{stroke-width:2.2}
/* PROGRESIE */
.prog-tools{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.prog-tools button{border:1px solid var(--border);background:#fff;border-radius:7px;padding:6px 12px;cursor:pointer;font-weight:600;font-size:12.5px}
.prog-tools button.on{background:var(--text);color:#fff;border-color:var(--text)}
.prog-head{font-size:11px;fill:#64748b;font-weight:700}
.prog-lbl{font-size:11.5px;font-weight:700;fill:#334155}
.prog-sub{font-size:10px;fill:#94a3b8}
.prog-node{cursor:pointer}
.prog-node text{font-family:ui-monospace,monospace;pointer-events:none}

/* TABLE */
table{border-collapse:collapse;width:100%;background:#fff;font-size:12.5px}
th,td{border:1px solid var(--border);padding:6px 9px;text-align:left;vertical-align:top}
th{background:#f8fafc;position:sticky;top:118px;cursor:pointer;white-space:nowrap}
th:hover{background:#eef2f7}
tbody tr:hover{background:#f8fafc}
td.code{font-family:ui-monospace,monospace;font-size:11px;white-space:nowrap}
.minibar{display:inline-block;height:6px;border-radius:3px;background:var(--d-bd)}

/* DETAIL PANEL */
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:40;display:none}
#overlay.open{display:block}
#panel{position:fixed;top:0;right:0;width:min(560px,94vw);height:100%;background:#fff;z-index:50;
  transform:translateX(100%);transition:.2s;overflow-y:auto;box-shadow:-6px 0 24px rgba(0,0,0,.18)}
#panel.open{transform:translateX(0)}
.p-head{padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff}
.p-head.t{border-top:5px solid var(--t-bd)} .p-head.d{border-top:5px solid var(--d-bd)}
.p-close{position:absolute;top:12px;right:14px;border:none;background:#f1f5f9;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px}
.p-body{padding:14px 18px}
.sec{margin-bottom:16px}
.sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 7px;border-bottom:1px solid var(--border);padding-bottom:4px}
.chipset{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11.5px;border-radius:14px;padding:3px 10px;border:1px solid transparent}
.chip.valori{background:var(--c-valori-bg);color:var(--c-valori)}
.chip.domenii{background:var(--c-domenii-bg);color:var(--c-domenii)}
.chip.concepte{background:var(--c-concepte-bg);color:var(--c-concepte)}
.chip.procese{background:var(--c-procese-bg);color:var(--c-procese)}
.chip.aplicative{background:var(--t-bg);color:var(--t)}
.ucomp-row{margin-bottom:6px}
.ucomp-chip{display:inline-block;font-family:ui-monospace,monospace;font-size:11px;background:var(--ucomp-bg);color:var(--ucomp);border-radius:5px;padding:2px 7px;cursor:help}
.ucon-item{border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:7px;background:#fcfcfd}
.ucon-name{font-size:12.5px;font-weight:600;margin-bottom:4px}
.derived{font-size:10.5px;color:var(--muted);font-style:italic}
.hint{font-size:11px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>📚 Vizualizator Curriculum — Educație tehnologică și TIC</h1>
    <span class="meta" id="meta"></span>
    <div class="tabs">
      <button class="tab active" data-view="timeline">⏱ Timeline</button>
      <button class="tab" data-view="tree">🌳 Arbore</button>
      <button class="tab" data-view="prog">📈 Progresie</button>
      <button class="tab" data-view="table">▦ Tabel</button>
    </div>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="Caută LU, lecție, competență, valoare, concept…">
    <div class="toggle">
      <span class="chk t" data-comp="T">▮ Tehnologic</span>
      <span class="chk d" data-comp="D">▮ Digital</span>
    </div>
    <span class="meta" id="count"></span>
  </div>
</header>
<main>
  <section id="timeline" class="view active"></section>
  <section id="tree" class="view"></section>
  <section id="prog" class="view"></section>
  <section id="table" class="view"></section>
</main>

<div id="overlay"></div>
<aside id="panel"></aside>

<script src="data.js"></script>
<script>
const ROMAN={1:'I',2:'II',3:'III',4:'IV',5:'V',6:'VI',7:'VII',8:'VIII',9:'IX'};
const C=CURRICULUM, UCOMP=C.ucomp, UCON=C.ucon;
const state={view:'timeline', comp:{T:true,D:true}, q:''};
const luById={}; C.lu.forEach(l=>luById[l.cod]=l);
const ucompToLU={}; C.lu.forEach(l=>(l.ucomp||[]).forEach(u=>{(ucompToLU[u]=ucompToLU[u]||[]).push(l.cod)}));
document.getElementById('meta').textContent =
  `${C.meta.nr_cs} CS · ${C.meta.nr_ucomp} UComp · ${C.meta.nr_lu} LU · ${C.meta.nr_ucon} UCon`;

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function ucompTitle(code){const u=UCOMP[code];return u?`${code} — ${u.desc}`:code}

function matchLU(l){
  if(!state.comp[l.comp]) return false;
  if(!state.q) return true;
  const q=state.q;
  const hay=[l.cod,l.title,...(l.ucon||[]),...(l.ucomp||[]),
    ...l.valori,...l.domenii,...l.concepte,...l.procese,...l.aplicative,
    ...(l.ucon||[]).map(c=>UCON[c]?UCON[c].name:'')].join(' ').toLowerCase();
  return hay.includes(q);
}
function filtered(){return C.lu.filter(matchLU)}

/* ---------- TIMELINE ---------- */
function renderTimeline(){
  const lus=filtered();
  const el=document.getElementById('timeline'); el.innerHTML='';
  if(!lus.length){el.innerHTML='<p class="meta">Niciun rezultat pentru filtrul curent.</p>';return}
  const legend=document.createElement('div');
  legend.className='lane-label';
  legend.innerHTML=`<span class="dot t"></span>Tehnologic &nbsp;&nbsp;<span class="dot d"></span>Digital &nbsp;·&nbsp; clasele I–IX — ordinea modulelor/scenariilor pe care le poate parcurge un elev`;
  el.appendChild(legend);
  const grid=document.createElement('div'); grid.className='timeline';
  for(let cls=1;cls<=9;cls++){
    const head=document.createElement('div'); head.className='col-head'; head.textContent='Clasa '+ROMAN[cls];
    grid.appendChild(head);
  }
  for(let cls=1;cls<=9;cls++){
    const cell=document.createElement('div'); cell.className='cell';
    lus.filter(l=>l.clasa===cls)
       .sort((a,b)=>a.comp.localeCompare(b.comp)||String(a.ord).localeCompare(String(b.ord),undefined,{numeric:true}))
       .forEach(l=>cell.appendChild(luCard(l)));
    grid.appendChild(cell);
  }
  el.appendChild(grid);
}
function luCard(l){
  const d=document.createElement('div'); d.className='lu-card '+l.comp.toLowerCase();
  d.innerHTML=`<div class="lu-code">${l.cod}${l.comp==='T'?' · modul '+l.ord:' · scenariu '+l.ord}</div>
    <div class="lu-title">${esc(l.title)}</div>
    <div class="lu-foot"><span class="pill">${l.ucon.length} lecții</span><span class="pill">${l.ucomp.length} UComp</span></div>`;
  d.onclick=()=>openPanel(l.cod);
  return d;
}

/* ---------- GRAPH (Arbore node-link) ---------- */
const CSCOL={'1':'#16a34a','2':'#2563eb','3':'#ea580c','4':'#7c3aed'};
function csColor(n){return CSCOL[String(n)]||'#64748b'}
function csOf(u){return u.split('.')[1]}
function dominantCS(l){const c={};l.ucomp.forEach(u=>{const k=csOf(u);c[k]=(c[k]||0)+1});let b='1',m=0;for(const k in c)if(c[k]>m){m=c[k];b=k}return b}
let GW=2800, GH=860, gscale=1;
function gedge(a,b,col,op,from,to){const my=((a.y+b.y)/2).toFixed(1);
  return `<path class="edge" data-a="${from}" data-b="${to}" data-op="${op}" d="M${a.x.toFixed(1)},${a.y} C${a.x.toFixed(1)},${my} ${b.x.toFixed(1)},${my} ${b.x.toFixed(1)},${b.y}" stroke="${col}" stroke-width="1" fill="none" opacity="${op}"/>`}
function gbox(cx,cy,w,h,id,label,fill,stroke,tcol,fs,tip,lu){
  const x=(cx-w/2).toFixed(1),y=(cy-h/2).toFixed(1);
  return `<g class="gnode${lu?' lu':''}" data-id="${id}" transform="translate(${x},${y})"><title>${esc(tip)}</title>`+
    `<rect width="${w}" height="${h}" rx="5" fill="${fill}" stroke="${stroke}" stroke-width="${lu?2:1.5}"/>`+
    `<text x="${w/2}" y="${(h/2+3.5).toFixed(1)}" text-anchor="middle" font-size="${fs}" font-weight="${lu?600:700}" fill="${tcol}">${label}</text></g>`;
}
function renderGraph(){
  const lus=filtered();
  const el=document.getElementById('tree'); el.innerHTML='';
  if(!lus.length){el.innerHTML='<p class="meta">Niciun rezultat.</p>';return}
  const CS_Y=46, UC_Y=140, BAND_TOP=232, BAND_H=64;
  GH=BAND_TOP+9*BAND_H+24;
  const csList=C.cs.map(c=>c.cod), nCS=csList.length, segW=GW/nCS, pos={};
  csList.forEach((cod,i)=>pos[cod]={x:segW*(i+0.5),y:CS_Y});
  // UComp grupate sub CS
  const ucBy={}; Object.values(UCOMP).forEach(u=>(ucBy[u.cs]=ucBy[u.cs]||[]).push(u.cod));
  Object.keys(ucBy).forEach(cs=>{const arr=ucBy[cs].sort();const i=csList.indexOf('CS.'+cs);const x0=segW*i+24,x1=segW*(i+1)-24;
    arr.forEach((cod,k)=>pos[cod]={x:x0+(x1-x0)*(arr.length<2?0.5:k/(arr.length-1)),y:UC_Y})});
  // LU pe (CS dominant, clasă)
  const byCol={}; lus.forEach(l=>{const cs=dominantCS(l);(byCol[cs+'_'+l.clasa]=byCol[cs+'_'+l.clasa]||[]).push(l)});
  Object.keys(byCol).forEach(key=>{const [cs,cls]=key.split('_');const i=csList.indexOf('CS.'+cs);const x0=segW*i+34,x1=segW*(i+1)-34;
    const arr=byCol[key].sort((a,b)=>a.comp.localeCompare(b.comp));const y=BAND_TOP+(cls-1)*BAND_H;
    arr.forEach((l,k)=>pos[l.cod]={x:x0+(x1-x0)*(arr.length<2?0.5:k/(arr.length-1)),y:y})});
  // benzi de clasă
  let bands='';
  for(let c=1;c<=9;c++){const y=BAND_TOP+(c-1)*BAND_H;bands+=`<rect x="0" y="${y-26}" width="${GW}" height="${BAND_H}" fill="${c%2?'#ffffff':'#f6f8fb'}"/><text x="8" y="${y-10}" class="band-lbl">Clasa ${ROMAN[c]}</text>`}
  // muchii
  let edges='';
  Object.values(UCOMP).forEach(u=>{const a=pos['CS.'+u.cs],b=pos[u.cod];if(a&&b)edges+=gedge(a,b,csColor(u.cs),0.22,'CS.'+u.cs,u.cod)});
  lus.forEach(l=>{const a=pos[l.cod];if(!a)return;l.ucomp.forEach(uc=>{const b=pos[uc];if(b)edges+=gedge(a,b,l.comp==='T'?'#f59e0b':'#3b82f6',0.16,l.cod,uc)})});
  // noduri
  let nodes='';
  csList.forEach(cod=>{const p=pos[cod];const cs=C.cs.find(x=>x.cod===cod);nodes+=gbox(p.x,p.y,140,30,cod,cod,csColor(cod.split('.')[1]),csColor(cod.split('.')[1]),'#fff',12,cod+' — '+(cs?cs.enunt:''),false)});
  Object.values(UCOMP).forEach(u=>{const p=pos[u.cod];if(!p)return;nodes+=gbox(p.x,p.y,90,22,u.cod,u.cod.replace('UComp.',''),'#fff',csColor(u.cs),csColor(u.cs),9.5,ucompTitle(u.cod),false)});
  lus.forEach(l=>{const p=pos[l.cod];if(!p)return;nodes+=gbox(p.x,p.y,104,26,l.cod,l.cod,'#fff',l.comp==='T'?'#f59e0b':'#3b82f6','#334155',8.5,l.cod+' — '+l.title,true)});
  el.innerHTML=`<div class="graph-tools">
      <button onclick="zoomG(1.25)" title="Mărește">＋</button>
      <button onclick="zoomG(0.8)" title="Micșorează">－</button>
      <button onclick="zoomFit()" title="Încadrează">⤢ fit</button>
      <span class="glegend">
        <span><span class="sq" style="background:#16a34a"></span>CS1</span>
        <span><span class="sq" style="background:#2563eb"></span>CS2</span>
        <span><span class="sq" style="background:#ea580c"></span>CS3</span>
        <span><span class="sq" style="background:#7c3aed"></span>CS4</span>
        <span><span class="sq" style="background:#fff;border:2px solid #f59e0b"></span>LU Tehnologic</span>
        <span><span class="sq" style="background:#fff;border:2px solid #3b82f6"></span>LU Digital</span>
        <span>· hover = evidențiază conexiuni · click pe LU = detalii</span>
      </span></div>
    <div class="graph-wrap" id="gwrap"><svg id="gsvg" viewBox="0 0 ${GW} ${GH}">
      <g>${bands}</g><g id="gedges">${edges}</g><g id="gnodes">${nodes}</g></svg></div>`;
  const svg=document.getElementById('gsvg');
  svg.addEventListener('mouseover',e=>{const g=e.target.closest('.gnode');if(g)hl(g.dataset.id)});
  svg.addEventListener('mouseout',e=>{const g=e.target.closest('.gnode');if(g)clearHl()});
  svg.addEventListener('click',e=>{const g=e.target.closest('.gnode.lu');if(g)openPanel(g.dataset.id)});
  zoomFit();
}
function hl(id){const svg=document.getElementById('gsvg');const conn=new Set([id]);
  svg.querySelectorAll('.edge').forEach(ed=>{const on=ed.dataset.a===id||ed.dataset.b===id;
    ed.classList.toggle('hl',on);ed.style.opacity=on?0.95:0.03;if(ed.dataset.a===id)conn.add(ed.dataset.b);if(ed.dataset.b===id)conn.add(ed.dataset.a)});
  svg.querySelectorAll('.gnode').forEach(n=>n.classList.toggle('dim',!conn.has(n.dataset.id)));}
function clearHl(){const svg=document.getElementById('gsvg');
  svg.querySelectorAll('.edge').forEach(ed=>{ed.classList.remove('hl');ed.style.opacity=ed.dataset.op});
  svg.querySelectorAll('.gnode').forEach(n=>n.classList.remove('dim'));}
function applyZoom(){const s=document.getElementById('gsvg');if(s){s.setAttribute('width',(GW*gscale).toFixed(0));s.setAttribute('height',(GH*gscale).toFixed(0))}}
function zoomG(f){gscale=Math.max(0.25,Math.min(2.5,gscale*f));applyZoom()}
function zoomFit(){const w=document.getElementById('gwrap');if(!w)return;gscale=Math.max(0.25,Math.min(1.4,(w.clientWidth-4)/GW));applyZoom()}

/* ---------- TABLE ---------- */
let sortKey='cod',sortDir=1;
function renderTable(){
  const lus=filtered();
  const el=document.getElementById('table');
  const cols=[['cod','Cod'],['clasaR','Clasă'],['comp','Comp'],['ord','Modul/Scen.'],['title','Titlu'],
    ['nUcon','#Lecții'],['nUcomp','#UComp'],['nVal','Valori'],['nDom','Domenii'],['nCon','Concepte'],['nProc','Procese']];
  const rows=lus.map(l=>({l,cod:l.cod,clasaR:l.clasa,comp:l.comp,ord:l.ord,title:l.title,
    nUcon:l.ucon.length,nUcomp:l.ucomp.length,nVal:l.valori.length,nDom:l.domenii.length,nCon:l.concepte.length,nProc:l.procese.length}));
  rows.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];
    if(typeof x==='number')return (x-y)*sortDir;
    return String(x).localeCompare(String(y),undefined,{numeric:true})*sortDir});
  let html='<table><thead><tr>'+cols.map(c=>`<th onclick="setSort('${c[0]}')">${c[1]}${sortKey===c[0]?(sortDir>0?' ▲':' ▼'):''}</th>`).join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{
    html+=`<tr>
      <td class="code"><a href="#" onclick="openPanel('${r.cod}');return false">${r.cod}</a></td>
      <td>${ROMAN[r.clasaR]}</td>
      <td><span class="badge ${r.comp.toLowerCase()}">${r.comp}</span></td>
      <td>${r.ord}</td>
      <td>${esc(r.title)}</td>
      <td>${r.nUcon}</td><td>${r.nUcomp}</td>
      <td>${r.nVal}</td><td>${r.nDom}</td><td>${r.nCon}</td><td>${r.nProc}</td></tr>`;
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}
function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1}renderTable()}

/* ---------- DETAIL PANEL ---------- */
function chipset(arr,cls){if(!arr||!arr.length)return '<span class="hint">—</span>';
  return '<div class="chipset">'+arr.map(t=>`<span class="chip ${cls}">${esc(t)}</span>`).join('')+'</div>'}
function openPanel(cod){
  const l=luById[cod]; if(!l)return;
  const p=document.getElementById('panel');
  const derived = l.comp==='D' || (l.comp==='T'&&l.clasa>=5);
  let ucon='';
  l.ucon.forEach(cc=>{const u=UCON[cc];if(!u)return;
    const tags=(u.ucomp||[]).map(x=>`<span class="ucomp-chip" title="${esc(ucompTitle(x))}">${x}</span>`).join(' ');
    ucon+=`<div class="ucon-item"><div class="ucon-name">📄 ${esc(u.name)}</div>
      <div>${tags||'<span class="hint">fără UComp</span>'}</div></div>`});
  const ucompDev=l.ucomp.map(x=>`<span class="ucomp-chip" title="${esc(ucompTitle(x))}">${x}</span>`).join(' ');
  p.className='open'; p.innerHTML=`
   <div class="p-head ${l.comp.toLowerCase()}">
     <button class="p-close" onclick="closePanel()">✕</button>
     <div class="lu-code">${l.cod} · Clasa ${ROMAN[l.clasa]} · <span class="badge ${l.comp.toLowerCase()}">${l.comp==='T'?'Tehnologic':'Digital'}</span></div>
     <h2 style="margin:6px 0 0;font-size:17px">${esc(l.title)}</h2>
     <div class="hint">${l.comp==='T'?'Modul opțional '+l.ord:'Scenariu '+l.ord} · ${l.ucon.length} lecții · ${l.ucomp.length} unități de competență</div>
   </div>
   <div class="p-body">
     <div class="sec"><h3>Unități de competență dezvoltate</h3><div>${ucompDev||'—'}</div>
        <div class="hint">Treci cu mouse-ul peste cod pentru descriere.</div></div>
     <div class="sec"><h3>Unități de conținut (lecții) → competențe</h3>${ucon||'—'}</div>
     <div class="sec"><h3>Valori promovate ${derived?'<span class="derived">(derivat din conținut + CRCN)</span>':''}</h3>${chipset(l.valori,'valori')}</div>
     <div class="sec"><h3>Domenii de acțiune</h3>${chipset(l.domenii,'domenii')}</div>
     <div class="sec"><h3>Concepte fundamentale</h3>${chipset(l.concepte,'concepte')}</div>
     <div class="sec"><h3>Procese</h3>${chipset(l.procese,'procese')}</div>
     <div class="sec"><h3>Conținuturi aplicative</h3>${chipset(l.aplicative,'aplicative')}</div>
   </div>`;
  document.getElementById('overlay').className='open';
}
function closePanel(){document.getElementById('panel').className='';document.getElementById('overlay').className=''}
document.getElementById('overlay').onclick=closePanel;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});

/* ---------- PROGRESIE ---------- */
let progMode='competente';
function setProgMode(m){progMode=m;renderProg();}
function renderProg(){
  const el=document.getElementById('prog');
  let lines=[];
  if(progMode==='competente'){
    const groups={};
    Object.values(UCOMP).forEach(u=>{const pp=u.cod.split('.');const y=pp[1],z=pp[2],w=+pp[3];const cyc=w<=4?'primar':'gimnaziu';
      const key=y+'|'+z+'|'+cyc;(groups[key]=groups[key]||{cs:y,z:z,cyc:cyc,nodes:[]}).nodes.push({clasa:w,id:u.cod,title:u.desc})});
    Object.values(groups).forEach(g=>{g.nodes.sort((a,b)=>a.clasa-b.clasa);
      lines.push({cs:g.cs,z:+g.z,cyc:g.cyc,label:`CS${g.cs} · UC${g.z}`,sub:g.cyc,color:csColor(g.cs),
        nodes:g.nodes.map(n=>({clasa:n.clasa,id:n.id,label:n.id.replace('UComp.',''),title:n.title,kind:'ucomp'}))})});
    lines.sort((a,b)=>a.cs.localeCompare(b.cs)||(a.cyc>b.cyc?1:a.cyc<b.cyc?-1:0)||a.z-b.z);
    if(state.q)lines=lines.filter(L=>L.label.toLowerCase().includes(state.q)||L.nodes.some(n=>(n.id+' '+n.title).toLowerCase().includes(state.q)));
  } else {
    const groups={};
    C.lu.filter(l=>state.comp[l.comp]).forEach(l=>{const key=l.comp+'||'+l.title;(groups[key]=groups[key]||{comp:l.comp,title:l.title,nodes:[]}).nodes.push(l)});
    Object.values(groups).forEach(g=>{g.nodes.sort((a,b)=>a.clasa-b.clasa);
      lines.push({comp:g.comp,label:g.title,sub:g.comp==='T'?'Tehnologic':'Digital',color:g.comp==='T'?'#f59e0b':'#3b82f6',
        nodes:g.nodes.map(l=>({clasa:l.clasa,id:l.cod,label:l.cod,title:l.title,kind:'lu'}))})});
    lines.sort((a,b)=>a.sub.localeCompare(b.sub)||a.label.localeCompare(b.label));
    if(state.q)lines=lines.filter(L=>L.label.toLowerCase().includes(state.q)||L.nodes.some(n=>(n.id+' '+n.title).toLowerCase().includes(state.q)));
  }
  const LBL=235,COLW=126,ROWH=52,TOP=42,W=LBL+9*COLW,H=TOP+lines.length*ROWH+20;
  const cx=c=>LBL+(c-0.5)*COLW;
  let head=''; for(let c=1;c<=9;c++)head+=`<text x="${cx(c)}" y="26" text-anchor="middle" class="prog-head">Clasa ${ROMAN[c]}</text>`;
  let grid=''; for(let c=0;c<=9;c++){const x=LBL+c*COLW;grid+=`<line x1="${x}" y1="32" x2="${x}" y2="${H-10}" stroke="#eef2f7"/>`}
  let rows='';
  lines.forEach((L,i)=>{const y=TOP+i*ROWH+ROWH/2;
    rows+=`<rect x="0" y="${y-ROWH/2}" width="${W}" height="${ROWH}" fill="${i%2?'#f8fafc':'#fff'}"/>`;
    rows+=`<text x="10" y="${y-2}" class="prog-lbl">${esc(L.label.length>30?L.label.slice(0,30)+'…':L.label)}</text><text x="10" y="${y+13}" class="prog-sub">${esc(L.sub)}</text>`;
    for(let k=1;k<L.nodes.length;k++){const a=cx(L.nodes[k-1].clasa),b=cx(L.nodes[k].clasa);
      rows+=`<line x1="${a+42}" y1="${y}" x2="${b-44}" y2="${y}" stroke="${L.color}" stroke-width="2" marker-end="url(#arr)" opacity="0.65"/>`}
    L.nodes.forEach(n=>{const x=cx(n.clasa);
      rows+=`<g class="prog-node" data-kind="${n.kind}" data-id="${n.id}" transform="translate(${x-42},${y-14})"><title>${esc(n.title)}</title>
        <rect width="84" height="28" rx="6" fill="#fff" stroke="${L.color}" stroke-width="2"/>
        <text x="42" y="18" text-anchor="middle" font-size="9.5" fill="#334155">${esc(n.label)}</text></g>`});
  });
  el.innerHTML=`<div class="prog-tools">
     <button class="${progMode==='competente'?'on':''}" onclick="setProgMode('competente')">Competențe (UComp)</button>
     <button class="${progMode==='module'?'on':''}" onclick="setProgMode('module')">Module / scenarii (LU)</button>
     <span class="glegend"><span><span class="sq" style="background:#94a3b8"></span>→ progresie · pre-rechizitul = nodul anterior din fir</span>
       <span>· click pe nod = pre-rechizite & detalii</span>${progMode==='competente'?'<span>· firele separă primar (I–IV) de gimnaziu (V–IX)</span>':''}</span></div>
   <div class="graph-wrap"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
     <defs><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
     <g>${grid}</g><g>${rows}</g><g>${head}</g></svg></div>`;
  el.querySelector('svg').addEventListener('click',e=>{const g=e.target.closest('.prog-node');if(g)progFocus(g.dataset.kind,g.dataset.id)});
}
function progFocus(kind,id){
  if(kind==='lu'){openPanel(id);return}
  const u=UCOMP[id]; if(!u)return;
  const pp=id.split('.'),y=pp[1],z=pp[2],w=+pp[3],cyc=w<=4?'primar':'gimnaziu';
  const line=Object.values(UCOMP).filter(x=>{const q=x.cod.split('.');return q[1]===y&&q[2]===z&&((+q[3]<=4)===(w<=4))}).sort((a,b)=>(+a.cod.split('.')[3])-(+b.cod.split('.')[3]));
  const idx=line.findIndex(x=>x.cod===id), prev=line.slice(0,idx), next=line.slice(idx+1);
  const chip=x=>`<span class="ucomp-chip" title="Clasa ${ROMAN[+x.cod.split('.')[3]]} — ${esc(x.desc)}" onclick="progFocus('ucomp','${x.cod}')" style="cursor:pointer">${x.cod.replace('UComp.','')}</span>`;
  const dev=(ucompToLU[id]||[]).map(c=>`<span class="ucomp-chip" onclick="openPanel('${c}')" style="cursor:pointer" title="${esc(luById[c].title)}">${c}</span>`).join(' ');
  const p=document.getElementById('panel'); p.className='open'; p.innerHTML=`
    <div class="p-head"><button class="p-close" onclick="closePanel()">✕</button>
      <div class="lu-code">${id} · Clasa ${ROMAN[w]} · CS${y} · ${cyc}</div>
      <h2 style="margin:6px 0 0;font-size:16px">${esc(u.desc)}</h2></div>
    <div class="p-body">
      <div class="sec"><h3>⬅ Pre-rechizite (Expects)</h3>${prev.length?'<div class="chipset">'+prev.map(chip).join('')+'</div><div class="hint">Tot ce trebuie format înainte — clasele anterioare din același fir de competență.</div>':'<span class="hint">Niciuna — acesta este punctul de pornire al firului.</span>'}</div>
      <div class="sec"><h3>➡ Necesară pentru (Expected By)</h3>${next.length?'<div class="chipset">'+next.map(chip).join('')+'</div>':'<span class="hint">Niciuna — finalul firului (clasa terminală).</span>'}</div>
      <div class="sec"><h3>Parte din</h3><span class="ucomp-chip" title="competență specifică">CS.${y}</span></div>
      <div class="sec"><h3>Dezvoltată în unități de învățare</h3>${dev||'<span class="hint">—</span>'}</div>
    </div>`;
  document.getElementById('overlay').className='open';
}

/* ---------- WIRING ---------- */
function rerender(){
  document.getElementById('count').textContent=filtered().length+' LU afișate';
  if(state.view==='timeline')renderTimeline();
  else if(state.view==='tree')renderGraph();
  else if(state.view==='prog')renderProg();
  else renderTable();
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); state.view=t.dataset.view;
  document.getElementById(state.view).classList.add('active'); rerender();
});
document.querySelectorAll('.chk').forEach(c=>c.onclick=()=>{
  const k=c.dataset.comp; state.comp[k]=!state.comp[k];
  c.classList.toggle('off',!state.comp[k]); rerender();
});
document.getElementById('search').oninput=e=>{state.q=e.target.value.trim().toLowerCase();rerender()};
rerender();
</script>
</body>
